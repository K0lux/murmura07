name: LLM Eval

on:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  llm-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run eval
        run: pnpm -w exec tsx scripts/eval.ts
