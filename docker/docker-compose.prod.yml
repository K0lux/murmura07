name: murmura-prod

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: murmura-web:prod
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - murmura-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    image: murmura-api-gateway:prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:-postgresql://murmura_app:murmura_app@postgres:5432/api_gateway?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://murmuraclaw:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otel.example.com/v1/traces}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      murmuraclaw:
        condition: service_started
    restart: unless-stopped
    networks:
      - murmura-network
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  murmuraclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile.murmuraclaw
    image: murmura-murmuraclaw:prod
    environment:
      NODE_ENV: production
      PORT: "3001"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-https://otel.example.com/v1/traces}
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - murmura-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-murmura_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-murmura_admin}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-murmura_admin} -d ${POSTGRES_DB:-postgres}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - murmura-network
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - murmura-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  murmura-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
