name: murmura-dev

services:
  landing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.landing
      args:
        VITE_WAITLIST_ENDPOINT: ${VITE_WAITLIST_ENDPOINT:-}
        VITE_WAITLIST_PROVIDER: ${VITE_WAITLIST_PROVIDER:-generic}
        VITE_WAITLIST_ANALYTICS_ENDPOINT: ${VITE_WAITLIST_ANALYTICS_ENDPOINT:-}
    image: murmura-landing:dev
    ports:
      - "4174:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - murmura-network

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3000
    image: murmura-web:dev
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - murmura-network

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    image: murmura-api-gateway:dev
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://murmura_app:murmura_app@postgres:5432/api_gateway?schema=public
      REDIS_URL: redis://redis:6379
      OPENCLAW_BASE_URL: http://murmuraclaw:3001
      JWT_ACCESS_SECRET: dev_access_secret
      JWT_REFRESH_SECRET: dev_refresh_secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      PROMETHEUS_ENABLED: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      murmuraclaw:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - murmura-network

  murmuraclaw:
    build:
      context: ..
      dockerfile: docker/Dockerfile.murmuraclaw
    image: murmura-murmuraclaw:dev
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - murmura-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: murmura_admin
      POSTGRES_PASSWORD: murmura_admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U murmura_admin -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - murmura-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - murmura-network

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://murmura_app:murmura_app@postgres:5432/api_gateway?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - murmura-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - murmura-network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    networks:
      - murmura-network

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy
      murmuraclaw:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
    networks:
      - murmura-network

  grafana:
    image: grafana/grafana:11.1.3
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - murmura-network

networks:
  murmura-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
