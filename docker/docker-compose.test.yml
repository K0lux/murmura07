name: murmura-test

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: murmura_admin
      POSTGRES_PASSWORD: murmura_admin
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U murmura_admin -d postgres
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - murmura-test-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - murmura-test-network

networks:
  murmura-test-network:
    driver: bridge
